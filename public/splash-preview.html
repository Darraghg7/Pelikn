<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Splash Icon Animation Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f1a17;
    font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
  }
  h1 { font-size: 13px; font-weight: 600; letter-spacing: .18em; text-transform: uppercase; opacity: .45; margin-bottom: 8px; }
  p  { font-size: 13px; opacity: .35; margin-bottom: 44px; }

  .row {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .card {
    width: 200px;
    background: radial-gradient(120% 80% at 50% 35%, #2D4F45 0%, #2A4A40 100%);
    border-radius: 28px;
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    border: 1.5px solid rgba(255,255,255,.08);
  }
  .card:hover { border-color: rgba(255,255,255,.18); }
  .label {
    font-size: 11px; font-weight: 600; letter-spacing: .12em;
    text-transform: uppercase; opacity: .5; margin-top: 8px;
  }
  .sublabel {
    font-size: 10px; opacity: .3; text-align: center; line-height: 1.4;
    max-width: 140px;
  }
  .replay-btn {
    margin-top: 8px;
    font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase;
    background: rgba(255,255,255,.1); border: none; color: #fff;
    padding: 6px 14px; border-radius: 20px; cursor: pointer; opacity: .6;
  }
  .replay-btn:hover { opacity: 1; background: rgba(255,255,255,.18); }

  /* ── CURRENT (A): simple scale+fade ──────────────────────── */
  .icon-a {
    animation: icon-a-in 0.8s 0.15s cubic-bezier(.22,.9,.28,1) both;
  }
  @keyframes icon-a-in {
    from { transform: scale(0.75); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
  }

  /* ── OPTION B: stroke draw-on → fill flood + glow burst ──── */
  .icon-b-wrap {
    position: relative;
    animation: icon-b-rise 0.5s 0.1s cubic-bezier(.22,.9,.28,1) both;
  }
  @keyframes icon-b-rise {
    from { transform: translateY(18px) scale(0.92); opacity: 0; }
    to   { transform: translateY(0)    scale(1);    opacity: 1; }
  }
  .icon-b-wrap .glow {
    position: absolute; inset: -30px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(140,220,170,.55) 0%, transparent 70%);
    animation: icon-b-glow 0.8s 0.55s ease-out both;
    pointer-events: none;
  }
  @keyframes icon-b-glow {
    0%   { opacity: 0; transform: scale(0.4); }
    35%  { opacity: 1; transform: scale(1.1); }
    100% { opacity: 0; transform: scale(1.6); }
  }
  /* Paths drawn on via stroke-dashoffset */
  .icon-b path {
    fill: rgba(255,255,255,0);
    stroke: #fff;
    stroke-width: 4;
    stroke-linejoin: round;
    stroke-linecap: round;
  }
  .icon-b path:nth-child(1) {
    stroke-dasharray: 600;
    stroke-dashoffset: 600;
    animation: icon-b-draw 0.65s 0.15s cubic-bezier(.4,0,.2,1) forwards,
               icon-b-fill 0.35s 0.72s ease forwards;
  }
  .icon-b path:nth-child(2) {
    stroke-dasharray: 500;
    stroke-dashoffset: 500;
    animation: icon-b-draw 0.55s 0.28s cubic-bezier(.4,0,.2,1) forwards,
               icon-b-fill 0.35s 0.72s ease forwards;
  }
  @keyframes icon-b-draw {
    to { stroke-dashoffset: 0; }
  }
  @keyframes icon-b-fill {
    from { fill: rgba(255,255,255,0);  stroke-width: 4; }
    to   { fill: rgba(255,255,255,1);  stroke-width: 0; }
  }

  /* ── OPTION C: liquid-rise clip reveal + drop bounce ─────── */
  .icon-c-wrap {
    position: relative;
    animation: icon-c-drop 0.7s 0.1s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes icon-c-drop {
    from { transform: translateY(-32px) scale(0.85); opacity: 0; }
    to   { transform: translateY(0)     scale(1);    opacity: 1; }
  }
  .icon-c-wrap .ripple {
    position: absolute; inset: -20px;
    border: 2px solid rgba(255,255,255,.5);
    border-radius: 50%;
    animation: icon-c-ripple1 0.7s 0.62s ease-out both;
    pointer-events: none;
  }
  .icon-c-wrap .ripple2 {
    position: absolute; inset: -20px;
    border: 1.5px solid rgba(255,255,255,.25);
    border-radius: 50%;
    animation: icon-c-ripple1 0.85s 0.72s ease-out both;
    pointer-events: none;
  }
  @keyframes icon-c-ripple1 {
    0%   { opacity: 1; transform: scale(.7); }
    100% { opacity: 0; transform: scale(1.8); }
  }
  /* liquid fill mask */
  .icon-c {
    mask-image: linear-gradient(to top, black 0%, black 100%, transparent 100%);
    -webkit-mask-image: linear-gradient(to top, black 0%, black 100%, transparent 100%);
    mask-size: 100% 200%;
    -webkit-mask-size: 100% 200%;
    mask-position: 0% 100%;
    -webkit-mask-position: 0% 100%;
    animation: icon-c-fill 0.55s 0.55s cubic-bezier(.4,0,.2,1) forwards;
  }
  @keyframes icon-c-fill {
    from {
      mask-position: 0% 100%;
      -webkit-mask-position: 0% 100%;
    }
    to {
      mask-position: 0% 0%;
      -webkit-mask-position: 0% 0%;
    }
  }

  /* replay class — removes animation so re-adding restarts it */
  .no-anim * { animation: none !important; transition: none !important; }
</style>
</head>
<body>

<h1>Splash Icon Animations</h1>
<p>Click "Replay" on any card to see it again. Click the card itself to use that option.</p>

<div class="row">

  <!-- CURRENT -->
  <div class="card" id="card-a">
    <div class="icon-a" id="anim-a">

      </svg>
    </div>
    <div class="label">Current</div>
    <div class="sublabel">Scale + fade in</div>
    <button class="replay-btn" onclick="replay('a', event)">Replay</button>
  </div>

  <!-- OPTION B: stroke draw + fill -->
  <div class="card" id="card-b">
    <div class="icon-b-wrap" id="anim-b">
      <div class="glow"></div>
      <svg class="icon-b" width="88" height="88" viewBox="0 0 218.749 224.045" style="display:block;overflow:visible">
        <path d="M111.581 104.182C96.2532 104.543 80.9327 105.088 65.6202 105.829C60.5271 106.056 45.127 107.88 41.575 105.113C40.7355 102.743 40.8666 103.955 41.3785 101.335C43.6299 98.8182 47.2266 98.3284 50.4259 98.659C63.5708 100.006 131.793 91.8746 139.38 94.6178C143.225 99.2529 133.006 106.588 129.368 111.762C114.802 132.477 110.197 170.39 77.5307 168.731C49.3708 165.694 45.8813 136.75 46.7483 115.308C70.6601 112.405 93.878 108.474 117.612 105.315C116.161 104.28 113.504 104.335 111.581 104.182Z"/>
        <path d="M148.644 51.1993C183.239 49.7481 187.978 90.0071 164.264 109.344C142.392 127.174 130.764 152.291 163.008 168.658L160.027 168.645C139.961 168.474 133.495 157.422 134.31 138.44C137.83 118.498 152.458 110.25 164.662 95.8485C177.496 80.4735 167.956 55.9997 146.305 60.1389C135.522 62.1963 128.977 74.4423 123.111 82.935C119.461 82.935 115.959 83.1248 112.322 83.3085C122.658 68.6928 129.24 54.0955 148.644 51.1993Z"/>
      </svg>
    </div>
    <div class="label">Option B</div>
    <div class="sublabel">Stroke draws on, floods to fill + glow burst</div>
    <button class="replay-btn" onclick="replay('b', event)">Replay</button>
  </div>

  <!-- OPTION C: drop + liquid fill + ripple -->
  <div class="card" id="card-c">
    <div class="icon-c-wrap" id="anim-c">
      <div class="ripple"></div>
      <div class="ripple2"></div>
      <svg class="icon-c" width="88" height="88" viewBox="0 0 218.749 224.045" style="display:block;overflow:visible">
        <path d="M111.581 104.182C96.2532 104.543 80.9327 105.088 65.6202 105.829C60.5271 106.056 45.127 107.88 41.575 105.113C40.7355 102.743 40.8666 103.955 41.3785 101.335C43.6299 98.8182 47.2266 98.3284 50.4259 98.659C63.5708 100.006 131.793 91.8746 139.38 94.6178C143.225 99.2529 133.006 106.588 129.368 111.762C114.802 132.477 110.197 170.39 77.5307 168.731C49.3708 165.694 45.8813 136.75 46.7483 115.308C70.6601 112.405 93.878 108.474 117.612 105.315C116.161 104.28 113.504 104.335 111.581 104.182Z" fill="#fff"/>
        <path d="M148.644 51.1993C183.239 49.7481 187.978 90.0071 164.264 109.344C142.392 127.174 130.764 152.291 163.008 168.658L160.027 168.645C139.961 168.474 133.495 157.422 134.31 138.44C137.83 118.498 152.458 110.25 164.662 95.8485C177.496 80.4735 167.956 55.9997 146.305 60.1389C135.522 62.1963 128.977 74.4423 123.111 82.935C119.461 82.935 115.959 83.1248 112.322 83.3085C122.658 68.6928 129.24 54.0955 148.644 51.1993Z" fill="#fff"/>
      </svg>
    </div>
    <div class="label">Option C</div>
    <div class="sublabel">Drops in from above, ripple rings on landing</div>
    <button class="replay-btn" onclick="replay('c', event)">Replay</button>
  </div>

</div>

<script>
function replay(id, e) {
  if (e) e.stopPropagation();
  const el = document.getElementById('anim-' + id);
  // Remove then re-add the element to restart CSS animations
  const parent = el.parentNode;
  const clone = el.cloneNode(true);
  parent.removeChild(el);
  clone.id = 'anim-' + id;
  parent.insertBefore(clone, parent.querySelector('.label'));
}
</script>
</body>
</html>
