<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />

    <!-- PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Pelikn" />
    <meta name="application-name" content="Pelikn" />
    <meta name="theme-color" content="#1a1a18" />
    <meta name="description" content="Food safety & operations management" />
    <link rel="manifest" href="/manifest.json" />

    <!-- App icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Load Google Fonts async so it never blocks the first paint -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"></noscript>
    <title>Pelikn</title>

    <!-- Safe area insets for iPhone notch / Dynamic Island / home indicator -->
    <style>
      :root {
        --safe-top: env(safe-area-inset-top, 0px);
        --safe-bottom: env(safe-area-inset-bottom, 0px);
        --safe-left: env(safe-area-inset-left, 0px);
        --safe-right: env(safe-area-inset-right, 0px);
      }
      /* Safe-area insets are applied per-element inside AppShell to avoid
         double-padding. Do NOT add padding-top/bottom here. */
    </style>

    <!-- Complete animated splash shown before React mounts. React only removes
         this layer after the splash sequence so iOS/WKWebView cannot show a
         blank green handoff. -->
    <style>
      body { margin: 0; background: #2A4A40; }
      #pk-splash {
        position: fixed; inset: 0;
        z-index: 99999;
        background: radial-gradient(120% 80% at 50% 35%, #2D4F45 0%, #2A4A40 100%);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 16px;
        overflow: hidden; pointer-events: none;
        opacity: 1;
        transform: translateZ(0);
      }
      #pk-splash .pk-splash-halo {
        position: absolute; top: 50%; left: 50%;
        width: 260px; height: 260px; border-radius: 999px;
        background: radial-gradient(circle, rgba(255,255,255,.22) 0%, rgba(255,255,255,.06) 40%, transparent 70%);
        transform: translate(-50%,-50%) scale(0.3);
        opacity: 0;
      }
      #pk-splash .pk-splash-icon-wrap {
        position: relative; z-index: 1;
        opacity: 0;
        transform: translate3d(0,20px,0) scale(0.9);
      }
      #pk-splash .pk-splash-glow {
        position: absolute; top: 50%; left: 50%;
        width: 200px; height: 200px; margin-top: -100px; margin-left: -100px;
        border-radius: 999px;
        background: radial-gradient(circle, rgba(120,210,150,.7) 0%, rgba(80,180,120,.2) 45%, transparent 70%);
        opacity: 0;
      }
      #pk-splash .pk-splash-word {
        display: flex; overflow: hidden; height: 58px; position: relative; z-index: 1;
      }
      #pk-splash .pk-splash-word span {
        display: inline-block;
        font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        font-weight: 700; font-size: 48px; line-height: 58px;
        letter-spacing: -0.01em; color: #fff;
        opacity: 0; transform: translate3d(0,110%,0);
      }
      #pk-splash .pk-splash-tag {
        position: relative; z-index: 1;
        font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        font-size: 11px; font-weight: 500; letter-spacing: 0.28em;
        text-transform: uppercase; color: #fff;
        opacity: 0; transform: translate3d(0,5px,0);
      }
      #pk-splash.pk-splash-run {
        animation: pk-splash-out 2.6s ease-out forwards;
      }
      #pk-splash.pk-splash-run .pk-splash-halo {
        animation: pk-halo 0.9s cubic-bezier(.22,.9,.28,1) both;
      }
      #pk-splash.pk-splash-run .pk-splash-icon-wrap {
        animation: pk-icon-rise 0.5s 0.1s cubic-bezier(.22,.9,.28,1) both;
      }
      #pk-splash.pk-splash-run .pk-splash-glow {
        animation: pk-glow-burst 1s 0.55s ease-out both;
      }
      #pk-splash.pk-splash-run .pk-splash-word span {
        animation: pk-ch 0.55s var(--pk-delay, 0.1s) cubic-bezier(.22,.9,.28,1) both;
      }
      #pk-splash.pk-splash-run .pk-splash-tag {
        animation: pk-tag 0.55s 0.55s cubic-bezier(.22,.9,.28,1) both;
      }
      @keyframes pk-splash-out {
        0%, 84% { opacity: 1; }
        100% { opacity: 0; }
      }
      @keyframes pk-halo {
        from { transform: translate(-50%,-50%) scale(0.3); opacity: 0; }
        to { transform: translate(-50%,-50%) scale(1); opacity: 1; }
      }
      @keyframes pk-icon-rise {
        from { transform: translate3d(0,20px,0) scale(0.9); opacity: 0; }
        to { transform: translate3d(0,0,0) scale(1); opacity: 1; }
      }
      @keyframes pk-glow-burst {
        0% { opacity: 0; transform: scale3d(0.3,0.3,1); }
        30% { opacity: 1; transform: scale3d(1.1,1.1,1); }
        100% { opacity: 0; transform: scale3d(1.8,1.8,1); }
      }
      @keyframes pk-ch {
        from { transform: translate3d(0,110%,0); opacity: 0; }
        45% { opacity: 1; }
        to { transform: translate3d(0,0,0); opacity: 1; }
      }
      @keyframes pk-tag {
        from { opacity: 0; transform: translate3d(0,5px,0); }
        to { opacity: 0.6; transform: translate3d(0,0,0); }
      }
    </style>
    <script>
      window.__peliknSplashDone = false;
      window.__peliknSplashStarted = false;
      window.__peliknStartSplash = function () {
        if (window.__peliknSplashStarted) return;
        window.__peliknSplashStarted = true;
        var splash = document.getElementById('pk-splash');
        if (splash) {
          splash.classList.remove('pk-splash-run');
          void splash.offsetWidth;
          splash.classList.add('pk-splash-run');
        }
        window.setTimeout(function () {
          window.__peliknSplashDone = true;
          window.dispatchEvent(new CustomEvent('pk-splash-done'));
        }, 2200);
        window.setTimeout(function () {
          var el = document.getElementById('pk-splash');
          if (el) el.remove();
        }, 2600);
      };
      window.setTimeout(function () {
        if (!window.__peliknSplashStarted) window.__peliknStartSplash();
      }, 1200);
      window.__peliknHideNativeSplash = function () {
        try {
          var plugin = window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.SplashScreen;
          if (plugin && plugin.hide) plugin.hide({ fadeOutDuration: 0 });
        } catch (_) {}
      };
    </script>
  </head>
  <body>
    <div id="pk-splash">
      <div class="pk-splash-halo"></div>
      <div class="pk-splash-icon-wrap">
        <div class="pk-splash-glow"></div>
        <svg width="120" height="120" viewBox="0 0 218.749 224.045" style="display:block;overflow:visible" aria-hidden="true">
          <path fill="#fff" d="M111.581 104.182C96.2532 104.543 80.9327 105.088 65.6202 105.829C60.5271 106.056 45.127 107.88 41.575 105.113C40.7355 102.743 40.8666 103.955 41.3785 101.335C43.6299 98.8182 47.2266 98.3284 50.4259 98.659C63.5708 100.006 131.793 91.8746 139.38 94.6178C143.225 99.2529 133.006 106.588 129.368 111.762C114.802 132.477 110.197 170.39 77.5307 168.731C49.3708 165.694 45.8813 136.75 46.7483 115.308C70.6601 112.405 93.878 108.474 117.612 105.315C116.161 104.28 113.504 104.335 111.581 104.182Z"/>
          <path fill="#fff" d="M148.644 51.1993C183.239 49.7481 187.978 90.0071 164.264 109.344C142.392 127.174 130.764 152.291 163.008 168.658L160.027 168.645C139.961 168.474 133.495 157.422 134.31 138.44C137.83 118.498 152.458 110.25 164.662 95.8485C177.496 80.4735 167.956 55.9997 146.305 60.1389C135.522 62.1963 128.977 74.4423 123.111 82.935C119.461 82.935 115.959 83.1248 112.322 83.3085C122.658 68.6928 129.24 54.0955 148.644 51.1993Z"/>
        </svg>
      </div>
      <div class="pk-splash-word" aria-label="Pelikn">
        <span style="--pk-delay:0.10s">P</span><span style="--pk-delay:0.14s">e</span><span style="--pk-delay:0.18s">l</span><span style="--pk-delay:0.22s">i</span><span style="--pk-delay:0.26s">k</span><span style="--pk-delay:0.30s">n</span>
      </div>
      <div class="pk-splash-tag">Food Safety, Simplified</div>
    </div>
    <!-- Start splash animations immediately once the #pk-splash element exists.
         No waiting for React — eliminates the blank-green-screen gap on iOS.
         __peliknStartSplash() is idempotent (guarded by __peliknSplashStarted). -->
    <script>window.__peliknStartSplash();</script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
