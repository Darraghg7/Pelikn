<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />

    <!-- PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Pelikn" />
    <meta name="application-name" content="Pelikn" />
    <meta name="theme-color" content="#1a1a18" />
    <meta name="description" content="Food safety & operations management" />
    <link rel="manifest" href="/manifest.json" />

    <!-- App icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Load Google Fonts async so it never blocks the first paint -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"></noscript>
    <title>Pelikn</title>

    <!-- Safe area insets for iPhone notch / Dynamic Island / home indicator -->
    <style>
      :root {
        --safe-top: env(safe-area-inset-top, 0px);
        --safe-bottom: env(safe-area-inset-bottom, 0px);
        --safe-left: env(safe-area-inset-left, 0px);
        --safe-right: env(safe-area-inset-right, 0px);
      }
      /* Safe-area insets are applied per-element inside AppShell to avoid
         double-padding. Do NOT add padding-top/bottom here. */
    </style>

    <!-- Plain background shown before React mounts (~50ms).
         React's SplashScreen component renders the full animated splash. -->
    <style>
      body { margin: 0; background: #2A4A40; }
      #pk-splash {
        position: fixed; inset: 0;
        background: radial-gradient(120% 80% at 50% 35%, #2D4F45 0%, #2A4A40 100%);
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <div id="pk-splash"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
