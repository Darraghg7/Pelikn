<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />

    <!-- PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Pelikn" />
    <meta name="application-name" content="Pelikn" />
    <meta name="theme-color" content="#1a1a18" />
    <meta name="description" content="Food safety & operations management" />
    <link rel="manifest" href="/manifest.json" />

    <!-- App icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Load Google Fonts async so it never blocks the first paint / splash screen -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"></noscript>
    <title>Pelikn</title>

    <!-- Safe area insets for iPhone notch / Dynamic Island / home indicator -->
    <style>
      :root {
        --safe-top: env(safe-area-inset-top, 0px);
        --safe-bottom: env(safe-area-inset-bottom, 0px);
        --safe-left: env(safe-area-inset-left, 0px);
        --safe-right: env(safe-area-inset-right, 0px);
      }
      /* Safe-area insets are applied per-element inside AppShell to avoid
         double-padding. Do NOT add padding-top/bottom here. */
    </style>

    <!-- Splash screen — pure HTML/CSS, shows before React or Capacitor load -->
    <style>
      #pk-splash {
        position: fixed;
        top: 0; right: 0; bottom: 0; left: 0;
        width: 100%; height: 100%;
        z-index: 99999;
        display: -webkit-box; display: -webkit-flex; display: flex;
        -webkit-box-orient: vertical; -webkit-box-direction: normal;
        -webkit-flex-direction: column; flex-direction: column;
        -webkit-box-align: center; -webkit-align-items: center; align-items: center;
        -webkit-box-pack: center; -webkit-justify-content: center; justify-content: center;
        gap: 16px;
        background: radial-gradient(120% 80% at 50% 35%, #2D4F45 0%, #2A4A40 100%);
        opacity: 1;
        pointer-events: none; overflow: hidden;
        -webkit-transform: translateZ(0); transform: translateZ(0);
      }
      #pk-splash.pk-hiding {
        transition: opacity 0.4s ease-out;
        opacity: 0;
      }
      #pk-halo {
        position: absolute; top: 50%; left: 50%;
        width: 260px; height: 260px; border-radius: 50%;
        background: radial-gradient(circle, rgba(255,255,255,0.22) 0%, rgba(255,255,255,0.06) 40%, transparent 70%);
        animation: pk-halo 0.9s cubic-bezier(.22,.9,.28,1) both;
      }
      @keyframes pk-halo {
        from { transform: translate(-50%,-50%) scale(0.3); opacity: 0; }
        to   { transform: translate(-50%,-50%) scale(1);   opacity: 1; }
      }
      /* Icon: rises up then paths draw on as outlines, flood-fill to white + glow burst */
      #pk-icon {
        position: relative; z-index: 1;
        animation: pk-icon-rise 0.5s 0.1s cubic-bezier(.22,.9,.28,1) both;
      }
      @keyframes pk-icon-rise {
        from { -webkit-transform: translateY(20px) scale(0.9); transform: translateY(20px) scale(0.9); opacity: 0; }
        to   { -webkit-transform: translateY(0)    scale(1);   transform: translateY(0)    scale(1);   opacity: 1; }
      }
      #pk-glow {
        position: absolute;
        top: 50%; left: 50%;
        width: 200px; height: 200px;
        margin-top: -100px; margin-left: -100px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(120,210,150,.7) 0%, rgba(80,180,120,.2) 45%, transparent 70%);
        pointer-events: none;
        animation: pk-glow-burst 1.0s 0.78s ease-out both;
      }
      @keyframes pk-glow-burst {
        0%   { opacity: 0; -webkit-transform: scale(0.3); transform: scale(0.3); }
        30%  { opacity: 1; -webkit-transform: scale(1.1); transform: scale(1.1); }
        100% { opacity: 0; -webkit-transform: scale(1.8); transform: scale(1.8); }
      }
      .pk-path {
        fill: rgba(255,255,255,0);
        stroke: #fff;
        stroke-width: 5;
        stroke-linejoin: round;
        stroke-linecap: round;
      }
      .pk-path-1 {
        stroke-dasharray: 620;
        stroke-dashoffset: 620;
        animation: pk-draw 0.65s 0.15s cubic-bezier(.4,0,.2,1) forwards,
                   pk-fill 0.3s  0.78s ease              forwards;
      }
      .pk-path-2 {
        stroke-dasharray: 520;
        stroke-dashoffset: 520;
        animation: pk-draw 0.55s 0.28s cubic-bezier(.4,0,.2,1) forwards,
                   pk-fill 0.3s  0.78s ease              forwards;
      }
      @keyframes pk-draw { to { stroke-dashoffset: 0; } }
      @keyframes pk-fill {
        from { fill: rgba(255,255,255,0); stroke-width: 5; }
        to   { fill: rgba(255,255,255,1); stroke-width: 0; }
      }
      #pk-word {
        display: flex; overflow: hidden; height: 58px;
        position: relative; z-index: 1;
      }
      .pk-ch {
        display: inline-block;
        font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        font-weight: 700; font-size: 48px; line-height: 58px;
        letter-spacing: -0.01em; color: #fff;
        animation: pk-ch 0.65s cubic-bezier(.22,.9,.28,1) both;
      }
      @keyframes pk-ch {
        from { transform: translateY(110%); opacity: 0; }
        45%  { opacity: 1; }
        to   { transform: translateY(0); opacity: 1; }
      }
      #pk-tag {
        position: relative; z-index: 1;
        font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        font-size: 11px; font-weight: 500;
        letter-spacing: 0.28em; text-transform: uppercase; color: #fff;
        animation: pk-tag 0.7s 1.0s cubic-bezier(.22,.9,.28,1) both;
      }
      @keyframes pk-tag {
        from { opacity: 0; transform: translateY(5px); }
        to   { opacity: 0.6; transform: translateY(0); }
      }
    </style>
  </head>
  <body>
    <div id="pk-splash">
      <div id="pk-halo"></div>
      <div id="pk-icon">
        <div id="pk-glow"></div>
        <svg width="120" height="120" viewBox="0 0 218.749 224.045" style="display:block;overflow:visible">
          <path class="pk-path pk-path-1" d="M111.581 104.182C96.2532 104.543 80.9327 105.088 65.6202 105.829C60.5271 106.056 45.127 107.88 41.575 105.113C40.7355 102.743 40.8666 103.955 41.3785 101.335C43.6299 98.8182 47.2266 98.3284 50.4259 98.659C63.5708 100.006 131.793 91.8746 139.38 94.6178C143.225 99.2529 133.006 106.588 129.368 111.762C114.802 132.477 110.197 170.39 77.5307 168.731C49.3708 165.694 45.8813 136.75 46.7483 115.308C70.6601 112.405 93.878 108.474 117.612 105.315C116.161 104.28 113.504 104.335 111.581 104.182Z"/>
          <path class="pk-path pk-path-2" d="M148.644 51.1993C183.239 49.7481 187.978 90.0071 164.264 109.344C142.392 127.174 130.764 152.291 163.008 168.658L160.027 168.645C139.961 168.474 133.495 157.422 134.31 138.44C137.83 118.498 152.458 110.25 164.662 95.8485C177.496 80.4735 167.956 55.9997 146.305 60.1389C135.522 62.1963 128.977 74.4423 123.111 82.935C119.461 82.935 115.959 83.1248 112.322 83.3085C122.658 68.6928 129.24 54.0955 148.644 51.1993Z"/>
        </svg>
      </div>
      <div id="pk-word">
        <span class="pk-ch" style="animation-delay:.10s">P</span>
        <span class="pk-ch" style="animation-delay:.18s">e</span>
        <span class="pk-ch" style="animation-delay:.26s">l</span>
        <span class="pk-ch" style="animation-delay:.34s">i</span>
        <span class="pk-ch" style="animation-delay:.42s">k</span>
        <span class="pk-ch" style="animation-delay:.50s">n</span>
      </div>
      <div id="pk-tag">Food Safety, Simplified</div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Start the countdown from first paint (requestAnimationFrame fires after
      // the browser has committed the first frame — i.e. after CSS has been applied
      // and #pk-splash is actually visible on screen). This prevents the timer from
      // ticking during any render-blocking resource load.
      requestAnimationFrame(function() {
        setTimeout(function() {
          var el = document.getElementById('pk-splash');
          if (!el) return;
          el.classList.add('pk-hiding');
          setTimeout(function() { el.remove(); }, 450);
        }, 2600);
      });
    </script>
  </body>
</html>
