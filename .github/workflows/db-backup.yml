name: Daily Database Backup

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC every day
  workflow_dispatch:        # allow manual trigger from Actions tab

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends postgresql-client

      # NOTE: SUPABASE_DB_URL must be the Supabase "Session pooler" URI
      # (aws-*.pooler.supabase.com) — the direct db.*.supabase.co host is
      # IPv6-only and unreachable from GitHub runners.
      - name: Dump and compress database
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -euo pipefail
          TIMESTAMP=$(date +%Y-%m-%d)
          echo "TIMESTAMP=${TIMESTAMP}" >> "$GITHUB_ENV"
          pg_dump "$SUPABASE_DB_URL" \
            --no-owner \
            --no-acl \
            --format=plain \
            --lock-wait-timeout=60s \
            | gzip > "pelikn-backup-${TIMESTAMP}.sql.gz"

      - name: Verify backup is not empty
        run: |
          set -euo pipefail
          MIN_BYTES=51200   # 50 KB — a real dump is far larger; an empty one is ~30 bytes
          SIZE=$(stat -c%s "pelikn-backup-${{ env.TIMESTAMP }}.sql.gz")
          echo "Backup size: ${SIZE} bytes"
          if [ "$SIZE" -lt "$MIN_BYTES" ]; then
            echo "::error::Backup file is only ${SIZE} bytes — pg_dump produced no data. Failing the run."
            exit 1
          fi
          # Sanity-check the dump actually contains schema statements
          if ! gunzip -c "pelikn-backup-${{ env.TIMESTAMP }}.sql.gz" | head -200 | grep -q "CREATE TABLE"; then
            echo "::error::Backup contains no CREATE TABLE statements — not a valid dump."
            exit 1
          fi

      - name: Encrypt backup
        run: |
          set -euo pipefail
          openssl enc -aes-256-cbc -pbkdf2 -iter 100000 \
            -in "pelikn-backup-${{ env.TIMESTAMP }}.sql.gz" \
            -out "pelikn-backup-${{ env.TIMESTAMP }}.sql.gz.enc" \
            -pass env:BACKUP_ENCRYPTION_PASSPHRASE
        env:
          BACKUP_ENCRYPTION_PASSPHRASE: ${{ secrets.BACKUP_ENCRYPTION_PASSPHRASE }}

      - name: Upload to Cloudflare R2
        run: |
          set -euo pipefail
          aws s3 cp "pelikn-backup-${{ env.TIMESTAMP }}.sql.gz.enc" \
            "s3://pelikn-backups/pelikn-backup-${{ env.TIMESTAMP }}.sql.gz.enc" \
            --endpoint-url "https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto

      # Secondary copy kept ENCRYPTED — the artifact previously stored the
      # plaintext dump on GitHub for 30 days.
      - name: Upload backup artifact (30-day secondary copy)
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}-${{ github.run_attempt }}
          path: pelikn-backup-*.sql.gz.enc
          retention-days: 30
          if-no-files-found: error
